exclude:
    (?x)^(
        .*/workflows/|
        .*/.*/notebooks/|
        .*/.*/src/|
        .*/.*/devops_pipelines/|
        .*/.*/lib/|
        .*/.*/aml_deployments/|
        .*/.*/components/|
        .*/.*/conda.yml|
        .*/.*/aml_environment.yml|
        .*/.*/tests/|
        .*/.*/azure-pipelines.yml|
        .*/.*/environment.yml|
        .*/.*/component_env.yml|
        .*/local_extensions.py|
        .*/.*/taskfile.yml
    )

repos:
-  repo: https://github.com/pre-commit/pre-commit-hooks
   rev: v3.4.0
   hooks:
   -  id: check-merge-conflict
   -  id: check-yaml
   
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
    -   id: mypy
        args: [--config-file=./pyproject.toml]

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.1
    hooks:
    -   id: ruff
        types_or: [ python, pyi, jupyter ]
        args: [--config=./pyproject.toml]
    -   id: ruff-format
        types_or: [ python, pyi, jupyter ]
        args: [--config=./pyproject.toml]