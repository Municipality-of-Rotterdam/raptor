parameters:
  - name: python_version
    type: string
  - name: poetry_version
    type: string
  - name: devops_organisation
    type: string
  - name: devops_project
    type: string
  - name: package_feed
    type: string
  - name: aml_environment
    type: string
  - name: base_image
    type: string
  - name: register_aml_env
    type: boolean
  - name: sh_agent_pool_name
    type: string

trigger:
  branches:
    include:
      - main
      - develop

variables:
  # Branch detection
  - name: isMain
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]

  # Determine feed view (prod for main, dvlm otherwise)
  - name: feed_view
    value: $[replace(replace(eq(variables['isMain'], true), True, 'prod'), False, 'dvlm')]

  # Environment-specific variable groups
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    - group: AmlProdGroup
  - ${{ else }}:
    - group: AmlDevGroup

stages:

- stage: Build
  displayName: Build package
  dependsOn: []
  jobs:
    - job: Build
      displayName: 'Build and store staging artifact'
      variables:
        build: true
      steps:
        - template: build.yml
          parameters:
            python_version: ${{ parameters.python_version }}
            poetry_version: ${{ parameters.poetry_version }}
            organisation_name: ${{ parameters.devops_organisation }}
            devops_project: ${{ parameters.devops_project }}
            package_feed: ${{ parameters.package_feed }}
            feed_view: $(feed_view)
            pat_username: $(PatUsername)
            pat: $(DevOpsPAT)

- stage: Register
  displayName: Register AML Environment
  dependsOn: Build
  jobs:
    - job: Register
      condition: eq(${{ parameters.register_aml_env }}, true)
      pool: ${{ parameters.sh_agent_pool_name }}
      displayName: 'Register new environment in Azure ML'
      steps:
        - template: register.yml
          parameters:
            service_connection: $(AmlServiceConnection)
            devops_organisation: ${{ parameters.devops_organisation }}
            package_feed_view: ${{ parameters.package_feed }}@$(feed_view)
            aml_environment: ${{ parameters.aml_environment }}
            base_image: ${{ parameters.base_image }}
