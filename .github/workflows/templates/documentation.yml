name: Generate Documentation for github pages

on: 
  workflow_call:
    inputs:
      PYTHON_VERSION: 
        required: true
        type: string

# Needed for publication on PyPI
permissions:
  contents: read # Permissions to read the repository code
  id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
  pages: write

jobs:
  Documentation:    
      runs-on: ubuntu-latest
      
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Python ${{ env.PYTHON_VERSION }}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}

        - name: Install dependencies with poetry
          run: |
            python -m pip install --upgrade pip
            python -m pip install poetry
            poetry install --only dev,docs

        - name: Build documentation modules
          run: poetry run sphinx-apidoc -o docs/source src --tocfile module

        - name: Build documentation
          run: |
            cd docs
            poetry run make clean
            poetry run make html

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: './docs/build/html'

        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
