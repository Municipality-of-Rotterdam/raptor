{% raw %}
parameters:
- name: service_connection
  type: string
- name: aml_resource_group
  type: string
- name: aml_workspace_name
  type: string
- name: aml_endpoint_name
  type: string
- name: aml_deployment_name
  type: string
- name: aml_mirror_traffic
  type: string

steps:
- checkout: self

- task: AzureCLI@2
  displayName: 'Remove mirror traffic if it exists'
  inputs:
    azureSubscription: '${{ parameters.service_connection }}'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      MIRROR_TRAFFIC=$(az ml online-endpoint show --name ${{ parameters.aml_endpoint_name }} --resource-group ${{ parameters.aml_resource_group }} \
      --workspace-name ${{ parameters.aml_workspace_name }} --query mirror_traffic --output json | jq -r 'keys[]' | wc -l)
      if [[ $MIRROR_TRAFFIC != 0 ]]
      then
          echo "Set the mirror traffic to 0% to disable mirroring to the ${{ parameters.aml_deployment_name }} deployment"
          az ml online-endpoint update --name ${{ parameters.aml_endpoint_name }} --mirror-traffic "${{ parameters.aml_deployment_name }}=0" \
          --resource-group ${{ parameters.aml_resource_group }} --workspace-name ${{ parameters.aml_workspace_name }}
      else
          echo "No mirror traffic present"
      fi

- task: AzureCLI@2
  displayName: 'Update online endpoint traffic allocation'
  inputs:
    azureSubscription: '${{ parameters.service_connection }}'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: >
      az ml online-endpoint update --name ${{ parameters.aml_endpoint_name }} --traffic "${{ parameters.aml_deployment_name }}=100"
      --resource-group ${{ parameters.aml_resource_group }} --workspace-name ${{ parameters.aml_workspace_name }}

- task: AzureCLI@2
  displayName: 'Test new online deployment with REST API'
  inputs:
    azureSubscription: '${{ parameters.service_connection }}'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      set -e
      SCORING_URI=$(az ml online-endpoint show --name ${{ parameters.aml_endpoint_name }} --resource-group ${{ parameters.aml_resource_group }} \
      --workspace-name ${{ parameters.aml_workspace_name }} --query scoring_uri --output tsv)
      
      set +x # supress printing secret
      ENDPOINT_KEY=$(az ml online-endpoint get-credentials --name ${{ parameters.aml_endpoint_name }} --resource-group ${{ parameters.aml_resource_group }} \
      --workspace-name ${{ parameters.aml_workspace_name }} --query primaryKey --output tsv)
      echo "$(curl --request POST "$SCORING_URI" --header "Authorization: Bearer $ENDPOINT_KEY" --header 'Content-Type: application/json' --data @sample-request.json)"
      set -x
      
      # echo "Get new deployment logs"
      # az ml online-deployment get-logs --name ${{ parameters.aml_deployment_name }} --endpoint-name ${{ parameters.aml_endpoint_name }} \
      # --resource-group ${{ parameters.aml_resource_group }} --workspace-name ${{ parameters.aml_workspace_name }}
    workingDirectory: '$(Build.SourcesDirectory)/aml_deployments/online/'

- task: AzureCLI@2
  displayName: 'Delete all other deployments if present'
  inputs:
    azureSubscription: '${{ parameters.service_connection }}'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Get number of deployments"
      NUMBER_DEPLOYMENTS=$(az ml online-endpoint show --name ${{ parameters.aml_endpoint_name }} --resource-group ${{ parameters.aml_resource_group }} \
      --workspace-name ${{ parameters.aml_workspace_name }} --query traffic --output yaml | wc -l)
      echo "There are $NUMBER_DEPLOYMENTS deployments"

      if [[ $NUMBER_DEPLOYMENTS -gt 1 ]]
      then
          echo $(az ml online-endpoint show --name ${{ parameters.aml_endpoint_name }} --resource-group ${{ parameters.aml_resource_group }} \
          --workspace-name ${{ parameters.aml_workspace_name }} --query traffic --output json) | jq -r 'keys[]' | 
          while IFS= read -r value; do
            # remove linux or windows style newlines
            normalised_value=$(echo $value | tr -d '\n\r')
            if [[ $normalised_value != ${{ parameters.aml_deployment_name }} ]]
            then
                echo "Remove $normalised_value deployment"
                az ml online-deployment delete --name $normalised_value --endpoint-name ${{ parameters.aml_endpoint_name }} \
                --resource-group ${{ parameters.aml_resource_group }} --workspace-name ${{ parameters.aml_workspace_name }} --yes --no-wait
            fi
          done
      fi
{% endraw %}