
steps:
  - template: /devops_pipelines/templates/install_and_configure_python.yml
    parameters:
      pythonVersion: '$(pythonVersion)'
  - script: |
      cookiecutter . --no-input --directory package_repo
    env:
      COOKIECUTTER_NO_INPUT: "1"
    displayName: 'Call cookiecutter on package_repo'
  - script: |
      cd ./pkg_package_name
      git add .
      pre-commit run --all-files --show-diff-on-failure
    displayName: 'Run package_repo own pre-commit config'
  - script: |
      cd ./pkg_package_name
      poetry install --only test
      poetry run pytest tests --doctest-modules --junitxml=junit/test-results.xml --cov=. --cov-config=.coveragerc_pipeline --cov-report=xml --cov-report=html -m "not onlylocal"
    displayName: 'Run pytest on package_repo generated tests'

