
variables:
  pythonVersion: {% endraw %}{{cookiecutter.python_version}}{% raw %}
  uvVersion: {% endraw %}{{cookiecutter.uv_version}}{% raw %}
  devops_organisation: {% endraw %}{{cookiecutter.organisation_name}}{% raw %}
  devops_project: {% endraw %}{{cookiecutter.project_name}}{% raw %}
  
  # Name of artifacts feed
  package_feed:  {% endraw %}{{cookiecutter.package_feed}}{% raw %}
  # UV index name for env var auth (uppercased, hyphens to underscores)
  uvIndexName: {% endraw %}{{ cookiecutter.package_feed | upper | replace('-', '_') }}{% raw %}
  
  # Whether to register environment in Azure Machine Learning based on package
  RegisterAmlEnv: {{cookiecutter.create_aml_environment_in_cicd}}
  aml_environment: {{cookiecutter.package_name}}
  sh_agent_pool_name: {{cookiecutter.private_agent_name}}
  base_image: mcr.microsoft.com/azureml/openmpi5.0-ubuntu24.04

  # branch to read the documentation files from
  docsBranch: 'refs/head/generated/docs'
