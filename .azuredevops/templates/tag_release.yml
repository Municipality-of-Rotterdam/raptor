
parameters:
- name: tag_branch
  type: string

steps:
- checkout: self
  persistCredentials: true
- bash: |
    set -euo pipefail
    RELEASE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
    echo "Checking availability of version $RELEASE_VERSION"..
    if git ls-remote --tags --exit-code origin "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
      echo "ERROR: Git tag '$RELEASE_VERSION' already exists on origin."
      exit 1
    else
      echo "OK: Version $RELEASE_VERSION is available"
    fi
  name: tag_availability
  displayName: Checking whether the proposed raptor version can be used to tag the proposed release

- bash: |
    set -euo pipefail
    COMMIT_HASH="$(Build.SourceVersion)"
    COMMIT_MESSAGE="$(Build.SourceVersionMessage)"
    RELEASE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
    git config user.name  "Azure Pipelines"
    git config user.email "ci@rotterdam.invalid"
    git tag -a "$RELEASE_VERSION" "$COMMIT_HASH" -m "$COMMIT_MESSAGE"
    git push origin "$RELEASE_VERSION"
  name: tag_release
  displayName: Tagging the merge commit associated with the latest raptor release
  condition: and(succeeded(), eq(variables['Build.SourceBranchName'], '${{ parameters.tag_branch }}'))
