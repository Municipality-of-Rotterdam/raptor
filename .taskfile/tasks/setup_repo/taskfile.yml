# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

includes:
  setup_compute_instance:
    taskfile: ../setup_compute_instance/taskfile.yml
    internal: true

# these vars can be overwritten by setting them in .env (in directory of parent taskfile)
vars:
  CONDA_ENV_DIR: '{{default "/anaconda/envs" .CONDA_ENV_DIR}}'
  # NOTE: ~ for home dir is not interpreted correctly, will create ~ dir inside working directory for some uv commands
  UV_VENV_DIR: '{{default "/home/azureuser/venv" .UV_VENV_DIR}}'
  # set venv dir on correct conda or venv directory (dependent on using conda or not)
  VENV_DIR: '{{if .USE_CONDA}}{{.CONDA_ENV_DIR}}{{else}}{{.UV_VENV_DIR}}{{end}}/{{.ENV_NAME}}'

# these vars are used and must be defined in the taskfile in your repo
# vars:
#   PYTHON_VERSION: 3.11
#   USE_CONDA: false
#   USE_POETRY: true
#   ENV_NAME: amazing_project
# # optional:
#   UV_SYNC_EXTRA: "--extra submodules"
#   SUBMODULES: ["lib/azureml_utils"]

tasks:

  _main:
    internal: true
    requires:
      vars: [USE_CONDA, USE_POETRY, ENV_NAME, PYTHON_VERSION]
    cmds:
      # check some input variables
      - task: check_vars
      # add to git maintenance
      - task: register_git_maintenance
      # initialize git submodules
      - task: init_submodules
      # install uv/poetry if not done yet
      - task: 'setup_compute_instance:{{if .USE_POETRY}}install_poetry{{else}}install_uv{{end}}'
      # create environment
      - task: '{{if .USE_CONDA}}create_conda_env{{else}}create_uv_env{{end}}'
      # install dependencies
      - task: '{{if .USE_POETRY}}poetry_sync{{else}}uv_sync{{end}}'
      # install precommit hook for this repo
      - task: precommit_install
      # install precommit hooks for submodules
      - for: { var: SUBMODULES }
        task: precommit_install
        vars:
          DIR: '{{.ITEM}}'
      - task: '{{if .USE_CONDA}}print_conda_path{{else}}print_uv_path{{end}}'
  
  # check for some variable conflicts
  check_vars:
    silent: true
    cmds:
      - echo .USE_CONDA={{.USE_CONDA}} .USE_POETRY={{.USE_POETRY}}
      - '{{if and .USE_CONDA .USE_POETRY}}echo "Using conda and poetry"{{end}}'
      - '{{if not .USE_POETRY | and .USE_CONDA}}echo "Using conda and uv"{{end}}'
      - '{{if not .USE_CONDA | and (not .USE_POETRY)}}echo "Using uv without conda"{{end}}'
      - |
        {{if not .USE_CONDA | and .USE_POETRY}}
        echo "Cannot use poetry without conda, wrong settings"
        exit 1
        {{end}}

  # init submodules (they are empty after cloning a repo)
  init_submodules:
    cmds:
      - git submodule update --init
    status:
      # check whether submodules are already directories (bit complicated to reuse SUBMODULES var)
      - for path in {{join " " .SUBMODULES}}; do [ -d "$path" ]; done

  # create python environment with uv
  create_uv_env:
    env:
      UV_PROJECT_ENVIRONMENT: "{{.VENV_DIR}}"
      PYTHON_VERSION: "{{.PYTHON_VERSION}}"
    cmds:
      - uv venv --python {{.PYTHON_VERSION}}
    status:
      - test -d {{.VENV_DIR}}

  # create python environment with conda
  create_conda_env:
    cmds:
      - conda env create -f environment.yml -n {{.ENV_NAME}}
    status:
      - test -d {{.VENV_DIR}}
  
  # install python dependencies with poetry
  poetry_sync:
    cmds:
      - poetry sync
    preconditions:
      - sh: '[ "$CONDA_DEFAULT_ENV" = "{{.ENV_NAME}}" ]'
        msg: First activate the conda environment with 'conda activate {{.ENV_NAME}}'

  # install python dependencies with uv
  uv_sync:
    env:
      UV_PROJECT_ENVIRONMENT: "{{.VENV_DIR}}"
    cmds:
      - task: set_uv_project_env_source
      # use UV_SYNC_EXTRA to pass other options (such as which groups to sync)
      - uv sync {{.UV_SYNC_EXTRA}}

  # for uv, set uv project environment variable permanently
  set_uv_project_env_source:
    cmds:
      - echo "export UV_PROJECT_ENVIRONMENT={{.VENV_DIR}}" >> "{{.VENV_DIR}}/bin/activate"
    preconditions:
      - sh: test -f {{.VENV_DIR}}/bin/activate
        msg: "Environment does not exist"
    status:
      - grep -q "UV_PROJECT_ENVIRONMENT" "{{.VENV_DIR}}/bin/activate"

  # install precommit hook
  precommit_install:
    # set uv project directory
    env:
      UV_PROJECT_ENVIRONMENT: "{{.VENV_DIR}}"
    # option to change working directory, to use for submodules
    dir: '{{.DIR}}'
    vars:
      DIR: '{{.DIR| default "."}}'
    cmds:
      # use poetry/uv run (so it works if environment is not yet activated)
      - '{{if .USE_POETRY }}poetry run{{else}}uv run{{end}} pre-commit install'
    preconditions:
      - sh: '{{if .USE_POETRY }}poetry run{{else}}uv run{{end}} pre-commit --version'
        msg: "Pre-commit not installed. Switch to the correct venv or install pre-commit with poetry/uv."
    status:
      # hooks for submodules are in modules subdirectory of .git
      # (assuming submodules are in lib subdirectory within project working directory,
      # if not, no big deal, pre-commit hook will be re-installed but is very fast)
      - test -f {{if eq .DIR "."}}.git{{else}}../../.git/modules/{{.DIR}}{{end}}/hooks/pre-commit

  # register repo for git maintenance (periodically optimize big repo cache)
  register_git_maintenance:
    cmds:
      # add current repo to git maintenance
      # for setup check https://stackoverflow.com/a/79741474
      - git maintenance register
  
  # print final message
  print_uv_path:
    cmds:
      - echo "Setup complete. For vscode, select interpreter (ctrl+shift+p) > Enter interpreter path > Find > {{.VENV_DIR}}/bin/python."
    silent: true

  print_conda_path:
    cmds:
      - echo "Setup complete. For vscode, select interpreter (ctrl+shift+p) {{.ENV_NAME}} (Conda)."
    silent: true

  convert_poetry_to_uv:
    prompt: "Note: this will convert the pyproject.toml and package manager to uv, but CI/CD still uses poetry and will not work. Accept?"
    cmds:
      # making sure uv is installed
      - task: setup_compute_instance:install_uv
      # migrate to uv
      - uvx migrate-to-uv
      - cmd: echo "Finish migration by setting USE_POETRY=false in your taskfile and run task setup_repo."
        silent: true
    