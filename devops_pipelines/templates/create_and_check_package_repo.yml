
steps:
  - template: /devops_pipelines/templates/install_and_configure_python.yml
    parameters:
      pythonVersion: '$(pythonVersion)'
  - script: |
      uv run cookiecutter . --no-input --directory package_repo
    env:
      COOKIECUTTER_NO_INPUT: "1"
    displayName: 'Call cookiecutter on package_repo (DevOps variant)'
  - script: |
      cd ./pkg_package_name
      git add .
      uv run pre-commit run --all-files --show-diff-on-failure
    displayName: 'Run pre-commit on package_repo (DevOps variant)'
  - script: |
      cd ./pkg_package_name
      uv sync --only-group test
      uv run pytest tests --doctest-modules --junitxml=junit/test-results.xml --cov=. --cov-config=.coveragerc_pipeline --cov-report=xml --cov-report=html -m "not onlylocal"
    displayName: 'Run pytest on package_repo (DevOps variant)'
  - script: |
      uv run cookiecutter . --no-input --directory package_repo additional_prompts=Github repo_name=pkg_package_name_gh
    env:
      COOKIECUTTER_NO_INPUT: "1"
    displayName: 'Call cookiecutter on package_repo (Github variant)'
  - script: |
      cd ./pkg_package_name_gh
      git add .
      uv run pre-commit run --all-files --show-diff-on-failure
    displayName: 'Run pre-commit on package_repo (Github variant)'
  - script: |
      cd ./pkg_package_name_gh
      uv sync --only-group test
      uv run pytest tests --doctest-modules --junitxml=junit/test-results.xml --cov=. --cov-config=.coveragerc_pipeline --cov-report=xml --cov-report=html -m "not onlylocal"
    displayName: 'Run pytest on package_repo (Github variant)'
