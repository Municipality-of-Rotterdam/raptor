parameters:
- name: python_version
  type: string
- name: poetry_version
  type: string
- name: organisation_name
  type: string
- name: devops_project
  type: string
- name: package_feed
  type: string
- name: feed_view
  type: string
- name: pat_username
  type: string
- name: pat
  type: string

steps:

  - template: configure_python.yml
    parameters:
      python_version: '${{ parameters.python_version }}'
      poetry_version: '${{ parameters.poetry_version }}'
      pat_username: '${{ parameters.pat_username }}'
      pat: '${{ parameters.pat }}'

  - script: poetry install --only build
    displayName: 'Install build dependencies with poetry'

  ###########################################################################
  # Extract version from pyproject.toml
  ###########################################################################
  - script: |
      set -e

      version_toml=$(poetry run tomlq -r '.project.version' pyproject.toml)
      echo "Version number in pyproject.toml: $version_toml"
      echo "##vso[task.setvariable variable=version_toml]$version_toml"
      
      if [[ ! "$version_toml" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        echo "##vso[task.logissue type=error]Error: Version number in pyproject.toml is not in number.number.number format"
        exit 1
      fi
    displayName: 'Get project version from pyproject.toml'

  ###########################################################################
  # Extract normalized package name
  ###########################################################################
  - script: |
      set -e
            
      name_toml=$(poetry run tomlq -r '.project.name' pyproject.toml)
      normalised_name=$(echo "$name_toml" | tr '[:upper:]' '[:lower:]' | sed 's/[^[:alnum:]]/-/g')
      
      echo "Package name in pyproject.toml (normalised): $normalised_name"
      echo "##vso[task.setvariable variable=normalised_name]$normalised_name"
    displayName: 'Get normalized project name from pyproject.toml'

  ###########################################################################
  # Check if feed exists
  ###########################################################################
  - script: |
      set -e

      FEED_URL="https://feeds.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/Feeds/${{ parameters.package_feed }}?api-version=7.1-preview.1"

      echo "=== DEBUG: Checking feed existence ==="
      echo "URL:"
      echo "$FEED_URL"
      echo ""

      echo "=== DEBUG: Performing curl request ==="
      http_code=$(curl -s -o feed_response.txt -w "%{http_code}" \
        -H "Authorization: Bearer $(System.AccessToken)" \
        "$FEED_URL"
      )

      echo "HTTP status code: $http_code"
      echo ""

      if [[ "$http_code" -ne 200 ]]; then
        echo "=== DEBUG: Response body ==="
        cat feed_response.txt
        echo ""
        echo "##vso[task.logissue type=error]Could not reach provided artifact feed, please make sure it exists."
        exit 1
      fi

      echo "Feed exists and is reachable."
    displayName: "Check if Artifacts feed exists (with logging)"

  ###########################################################################
  # Fetch package list and determine if package exists
  ###########################################################################
  - script: |
      set -e

      echo "Fetching package list from Azure Artifacts…"

      response=$(curl -sS \
        -H "Authorization: Bearer $(System.AccessToken)" \
        'https://feeds.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/Feeds/${{ parameters.package_feed }}/packages?api-version=7.1-preview.1'
      )

      echo "Raw response from Azure Artifacts:"
      echo "$response"

      # If response contains "The resource cannot be found." → feed exists but no packages
      if echo "$response" | grep -q "The resource cannot be found"; then
        echo "No packages found in feed. Package does not exist yet → clean exit."
        echo "##vso[task.setvariable variable=package_id]\"\""
        exit 0
      fi

      package_id=$(echo "$response" | jq -r ".value[] | select(.name == \"$(normalised_name)\") | .id")

      if [[ -z "$package_id" ]]; then
        echo "Package '$(normalised_name)' does not exist in feed → clean exit."
        echo "##vso[task.setvariable variable=package_id]\"\""
        exit 0
      fi

      echo "Resolved package_id: $package_id"
      echo "##vso[task.setvariable variable=package_id]$package_id"
    displayName: "Get package id by reading from artifacts feed"

  ###########################################################################
  # Check if version exists in feed
  ###########################################################################
  - script: |
      set -e

      if [[ -z "$package_id" ]]; then
        echo "Package does not exist → skipping version check."
        exit 0
      fi

      versions_info_feed=$(curl -sS \
        -H "Authorization: Bearer $(System.AccessToken)" \
        'https://feeds.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/Feeds/${{ parameters.package_feed }}/packages/$package_id/versions?api-version=7.1-preview.1'
      )

      versions_feed=($(echo "$versions_info_feed" | jq -r '.value[].protocolMetadata.data.version? // empty'))

      echo "Existing versions in feed: ${versions_feed[@]}"

      for version in "${versions_feed[@]}"; do
        if [[ "$version" == "$(version_toml)" ]]; then
          echo "##vso[task.logissue type=error]Version number already exists in feed, not allowing new deployment."
          exit 1
        fi
      done
    displayName: "Check if version number exists in Artifacts feed"

  ###########################################################################
  # Check if version exists in view
  ###########################################################################
  - script: |
      set -e

      if [[ -z "$package_id" ]]; then
        echo "Package does not exist → skipping view version check."
        exit 0
      fi

      versions_info_view=$(curl -sS \
        -H "Authorization: Bearer $(System.AccessToken)" \
        'https://feeds.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/Feeds/${{ parameters.package_feed }}@${{ parameters.feed_view }}/packages/$package_id/versions?api-version=7.1-preview.1'
      )

      versions_view=($(echo "$versions_info_view" | jq -r '.value[].protocolMetadata.data.version? // empty'))

      echo "Existing versions in view: ${versions_view[@]}"

      for version in "${versions_view[@]}"; do
        if [[ "$version" == "$(version_toml)" ]]; then
          echo "##vso[task.logissue type=error]Version number already exists in view, not allowing new deployment."
          exit 1
        fi
      done
    displayName: "Check if version number exists in Artifacts feed view"
