parameters:
- name: python_version
  type: string
- name: uv_version
  type: string
- name: uv_index_name
  type: string
  default: ''
- name: clientsecret
  type: string
- name: clientid
  type: string
- name: tenant
  type: string
- name: organisation
  type: string
- name: branchName
  type: string

steps:
- template: configure_python.yml
  parameters:
    python_version: '${{ parameters.python_version }}'
    uv_version: '${{ parameters.uv_version }}'

- script: uv sync --group docs
  displayName: 'Install docs dependencies with uv'
  env:
    ${{ if ne(parameters.uv_index_name, '') }}:
      UV_INDEX_${{ parameters.uv_index_name }}_USERNAME: VssSessionToken
      UV_INDEX_${{ parameters.uv_index_name }}_PASSWORD: $(System.AccessToken)

- download: current
  artifact: documentation_dir

- script: |
    python $(Agent.BuildDirectory)/s/devops_pipelines/scripts/create_or_update_wiki.py ^
      --filepath $(Pipeline.Workspace)/documentation_dir ^
      --project $(System.TeamProject) ^
      --name $(Build.Repository.Name) ^
      --branch ${{ parameters.branchName }} ^
      --clientsecret ${{ parameters.clientsecret }}  ^
      --clientid ${{ parameters.clientid }}  ^
      --tenant ${{ parameters.tenant }} ^
      --organisation ${{ parameters.organisation }}
  displayName: 'Create/Update Wiki'
