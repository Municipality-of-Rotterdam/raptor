{% raw %}
trigger:
  pr:
    branches:
      include:
      - *

variables:
# Extract variables from config.yml
- template: config.yml
# check whether this is a PR to main, run checks for things we want to do when isMain (after PR is completed)
# note: this variable is only available at runtime, not compile time, so using this variable can be complicated
- name: toMain
  value: $[eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/main')]
# use complicated ifelse to define feed_view, cannot use if at runtime, only at compile time (and toMain is only available at runtime)
- name: feed_view
  value: $[replace(replace(or(eq(variables['toMain'], true), eq(variables['isMain'], true)), True, 'prod'), False, 'dvlm')]

resources:
  repositories:
    - repository: raptor
      name: municipality-of-rotterdam/raptor
      type: github
      ref: {% endraw %}{{cookiecutter.__cookiecutter_template_version}}{% raw %}
      endpoint: {% endraw %}{{cookiecutter.github_service_connection}}{% raw %}

stages:
- stage: PreCommit
  jobs:
  - job: ExecutePreCommit
    displayName: 'Perform pre-commit checks'
    steps:
    - template: .azuredevops/templates/pre_commit.yml@raptor
      parameters:
        python_version: ${{ variables.pythonVersion }}
        poetry_version: ${{ variables.poetryVersion }}
        pat_username: $(PatUsername)
        pat: $(DevOpsPAT)

- stage: UnitTest
  jobs:
  - job: ExecuteUnitTests
    displayName: 'Unit Tests Coverage'
    steps:
    - template: .azuredevops/templates/test.yml@raptor
      parameters:
        python_version: ${{ variables.pythonVersion }}
        poetry_version: ${{ variables.poetryVersion }}
        pat_username: $(PatUsername)
        pat: $(DevOpsPAT)
        package_name: {% endraw %}{{cookiecutter.package_name}}{% raw %}

  - job: Build
    displayName: 'Build and store staging artifact'
    dependsOn: 
      - Check
    condition: eq(dependencies.Check.outputs['CheckSourceChanges.SourceHasChanged'], 'true')
    variables:
      build: false
      prod: eq(variables['toMain'], true
    steps:
    - template: .azuredevops/templates/build.yml@raptor
      parameters:
        python_version: ${{ variables.pythonVersion }}
        poetry_version: ${{ variables.poetryVersion }}
        organisation_name: ${{ variables.devops_organisation }}
        devops_project: ${{ variables.devops_project }}
        package_feed: ${{ variables.package_feed }}
        feed_view: $(feed_view)
        pat_username: $(PatUsername)
        pat: $(DevOpsPAT)

{% endraw %}