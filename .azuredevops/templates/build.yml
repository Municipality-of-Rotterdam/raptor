
parameters:
- name: python_version
  type: string
- name: poetry_version
  type: string
- name: organisation_name
  type: string
- name: devops_project
  type: string
- name: package_feed
  type: string
- name: feed_view
  type: string
- name: pat_username
  type: string
- name: pat
  type: string

steps:

  - template: configure_python.yml
    parameters:
      python_version: '${{ parameters.python_version }}'
      poetry_version: '${{ parameters.poetry_version }}'
      pat_username: '${{ parameters.pat_username }}'
      pat: '${{ parameters.pat }}'

  - script: |
      set -e
      echo "=== INSTALL BUILD DEPENDENCIES ==="
      echo "Python version:"
      python --version
      echo "Poetry version:"
      poetry --version
      echo "Installing build dependencies (poetry install --only build)..."
      poetry install --only build
      echo "Build dependencies installed successfully."
    displayName: 'Install build dependencies with poetry'

  ###########################################################################
  # Extract version from pyproject.toml
  ###########################################################################
  - script: |
      set -e
      echo "=== EXTRACT PROJECT VERSION ==="

      if [ ! -f pyproject.toml ]; then
        echo "##vso[task.logissue type=error]pyproject.toml not found."
        exit 1
      fi

      version_toml=$(poetry run tomlq -r '.project.version' pyproject.toml)

      if [[ -z "$version_toml" || "$version_toml" == "null" ]]; then
        echo "##vso[task.logissue type=error]Version not found in pyproject.toml."
        exit 1
      fi

      echo "Version detected: $version_toml"

      if [[ ! "$version_toml" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        echo "##vso[task.logissue type=error]Version must follow number.number.number format."
        exit 1
      fi

      echo "Version format validated."
      echo "##vso[task.setvariable variable=version_toml]$version_toml"
    displayName: 'Get project version from pyproject.toml'

  ###########################################################################
  # Extract normalized package name
  ###########################################################################
  - script: |
      set -e
      echo "=== EXTRACT PROJECT NAME ==="

      name_toml=$(poetry run tomlq -r '.project.name' pyproject.toml)

      if [[ -z "$name_toml" || "$name_toml" == "null" ]]; then
        echo "##vso[task.logissue type=error]Project name not found in pyproject.toml."
        exit 1
      fi

      normalised_name=$(echo "$name_toml" | tr '[:upper:]' '[:lower:]' | sed 's/[^[:alnum:]]/-/g')

      echo "Original project name: $name_toml"
      echo "Normalized package name: $normalised_name"

      echo "##vso[task.setvariable variable=normalised_name]$normalised_name"
    displayName: 'Get normalized project name from pyproject.toml'

  ###########################################################################
  # Check if feed exists
  ###########################################################################
  - script: |
      set -e
      echo "=== CHECK ARTIFACTS FEED EXISTENCE ==="

      FEED_URL="https://feeds.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/Feeds/${{ parameters.package_feed }}?api-version=7.1-preview.1"

      echo "Organisation: ${{ parameters.organisation_name }}"
      echo "Project: ${{ parameters.devops_project }}"
      echo "Feed: ${{ parameters.package_feed }}"
      echo "Checking feed availability..."

      http_code=$(curl -s -o /dev/null -w "%{http_code}" \
        -H "Authorization: Bearer $(System.AccessToken)" \
        "$FEED_URL")

      echo "HTTP status code: $http_code"

      if [[ "$http_code" -ne 200 ]]; then
        echo "##vso[task.logissue type=error]Artifacts feed not reachable or does not exist."
        exit 1
      fi

      echo "Feed exists and is accessible."
    displayName: "Check if Artifacts feed exists"

  ###########################################################################
  # Fetch package list and determine if package exists
  ###########################################################################
  - script: |
      set -e
      echo "=== CHECK IF PACKAGE EXISTS IN FEED ==="

      response=$(curl -sS \
        -H "Authorization: Bearer $(System.AccessToken)" \
        'https://feeds.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/Feeds/${{ parameters.package_feed }}/packages?api-version=7.1-preview.1')

      if [[ -z "$response" ]]; then
        echo "##vso[task.logissue type=error]Empty response from Azure Artifacts."
        exit 1
      fi

      total_packages=$(echo "$response" | jq '.value | length')
      echo "Total packages found in feed: $total_packages"

      if [[ "$total_packages" -eq 0 ]]; then
        echo "No packages currently exist in this feed."
        echo "##vso[task.setvariable variable=package_id]\"\""
        exit 0
      fi

      package_id=$(echo "$response" | jq -r ".value[] | select(.name == \"$(normalised_name)\") | .id")

      if [[ -z "$package_id" ]]; then
        echo "Package '$(normalised_name)' not found in feed."
        echo "##vso[task.setvariable variable=package_id]\"\""
        exit 0
      fi

      echo "Package found. Package ID resolved."
      echo "##vso[task.setvariable variable=package_id]$package_id"
    displayName: "Resolve package id from artifacts feed"

  ###########################################################################
  # Check if version exists in feed
  ###########################################################################
  - script: |
      set -e
      echo "=== CHECK VERSION IN FEED ==="

      if [[ -z "$(package_id)" ]]; then
        echo "Package does not exist → skipping version validation."
        exit 0
      fi

      versions_info_feed=$(curl -sS \
        -H "Authorization: Bearer $(System.AccessToken)" \
        'https://feeds.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/Feeds/${{ parameters.package_feed }}/packages/$(package_id)/versions?api-version=7.1-preview.1')

      version_count=$(echo "$versions_info_feed" | jq '.value | length')
      echo "Number of versions in feed: $version_count"

      versions_feed=($(echo "$versions_info_feed" | jq -r '.value[].protocolMetadata.data.version? // empty'))

      version_exists_feed=false
      for version in "${versions_feed[@]}"; do
        if [[ "$version" == "$(version_toml)" ]]; then
          echo "Found matching version in feed, will not build, only promote."
          version_exists_feed=true
        fi
      done
    displayName: "Check if version number exists in Artifacts feed"


  ###########################################################################
  # Check if version exists in view
  ###########################################################################
  - script: |
      set -e
      echo "=== CHECK VERSION IN FEED VIEW ==="

      if [[ -z "$(package_id)" ]]; then
        echo "Package does not exist → skipping view validation."
        exit 0
      fi

      versions_info_view=$(curl -sS \
        -H "Authorization: Bearer $(System.AccessToken)" \
        'https://feeds.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/Feeds/${{ parameters.package_feed }}@${{ parameters.feed_view }}/packages/$(package_id)/versions?api-version=7.1-preview.1')

      version_count=$(echo "$versions_info_view" | jq '.value | length')
      echo "Number of versions in view: $version_count"

      versions_view=($(echo "$versions_info_view" | jq -r '.value[].protocolMetadata.data.version? // empty'))

      for version in "${versions_view[@]}"; do
        if [[ "$version" == "$(version_toml)" ]]; then
          echo "##vso[task.logissue type=error]Version already exists in feed view."
          exit 1
        fi
      done

      echo "Version does not exist in feed view. Safe to proceed."
    displayName: "Check if version number exists in Artifacts feed view"

  - script: |
      echo "Checks complete."
      echo "Package name: $(normalised_name)"
      echo "Package version: $(version_toml)"
      echo "Package id: $(packge_id)"
      echo "Build flag: $(build)"
      echo "Version exists in feed: $(version_exists_feed)"
      echo "Version exists in view: $(versions_info_view)"
  displayName: "Debug display on completed checks"

  ###########################################################################
  # Build and publish to feed
  ###########################################################################
  - script: |
      set -e

      echo "Starting Python package build..."
      echo "Build flag: $(build)"
      echo "Version exists in feed: $(version_exists_feed)"

      echo "Running poetry build..."
      poetry build

      echo "Build completed successfully."
      echo "Generated distributions:"
      ls -1 dist/

    displayName: "Build distribution (if version not in feed)"
    condition: and(succeeded(), eq(variables['build'], true), eq(variables['version_exists_feed'], 'false'))


  - task: TwineAuthenticate@1
    displayName: "Authenticate with Azure Artifacts feed"
    inputs:
      artifactFeed: ${{ parameters.devops_project }}/${{ parameters.package_feed }}
    condition: and(succeeded(), eq(variables['build'], true), eq(variables['version_exists_feed'], 'false'))


  - script: |
      set -e

      echo "Preparing to publish package to Azure Artifacts feed..."
      echo "Feed: ${{ parameters.package_feed }}"
      echo "Using authenticated .pypirc from secure pipeline variable."

      if ! ls dist/*.whl > /dev/null 2>&1; then
        echo "ERROR: No wheel files found in dist/. Aborting publish."
        exit 1
      fi

      echo "Uploading wheel distribution..."
      # Do NOT echo config file path or contents (contains credentials)
      poetry run twine upload \
        -r "${{ parameters.package_feed }}" \
        --config-file "$(PYPIRC_PATH)" \
        dist/*.whl \
        --verbose

      echo "Package upload completed successfully."

    displayName: "Publish package (if version not in feed)"
    condition: and(succeeded(), eq(variables['build'], true), eq(variables['version_exists_feed'], 'false'))


  ###########################################################################
  # Promote (when version does not exist in specified view yet)
  ###########################################################################
  - script: |
      set -euo pipefail

      echo "Starting package promotion..."
      echo "Package: $(normalised_name)"
      echo "Version: $(version_toml)"
      echo "Target view: ${{ parameters.feed_view }}"
      echo "Feed: ${{ parameters.package_feed }}"
      echo "Project: ${{ parameters.devops_project }}"

      AZDO_URL="https://pkgs.dev.azure.com/${{ parameters.organisation_name }}/${{ parameters.devops_project }}/_apis/packaging/feeds/${{ parameters.package_feed }}/PyPI/packages/$(normalised_name)/versions/$(version_toml)?api-version=7.1-preview.1"

      echo "Sending promotion request to Azure Artifacts..."

      HTTP_STATUS=$(curl -sS -o response.json -w "%{http_code}" \
        -X PATCH "$AZDO_URL" \
        -H "Content-Type: application/json" \
        -u ":$(System.AccessToken)" \
        -d "{\"views\": {\"op\": \"add\", \"path\": \"/views/-\", \"value\": \"${{ parameters.feed_view }}\"}}"
      )

      if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
        echo "Promotion successful (HTTP $HTTP_STATUS)."
      else
        echo "ERROR: Promotion failed with HTTP status $HTTP_STATUS"
        echo "Response from server:"
        cat response.json
        exit 1
      fi

      rm -f response.json
      echo "Promotion step completed."

    displayName: "Promote package to view '${{ parameters.feed_view }}'"
    condition: and(succeeded(), eq(variables['build'], true))
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)