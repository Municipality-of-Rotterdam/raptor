{% raw %}
trigger: none

pr:
  branches:
    include:
      - "*"

variables:
  # Load shared config
  - template: config.yml

  # PR target checks
  - name: toMain
    value: $[eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/main')]

  - name: toDev
    value: $[eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/develop')]

  # Determine feed view at runtime (prod for main, dvlm otherwise)
  - name: feedView
    value: $[replace(replace(eq(variables['toMain'], true), True, 'prod'), False, 'dvlm')]

  # Environment-specific variable groups
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    - group: AmlProdGroup
  - ${{ else }}:
    - group: AmlDevGroup

resources:
  repositories:
    - repository: raptor
      name: municipality-of-rotterdam/raptor
      type: github
      ref: refs/tags/{% endraw %}{{cookiecutter.__cookiecutter_template_version}}{% raw %}
      endpoint: {% endraw %}{{ cookiecutter.github_service_connection }}{% raw %}

extends:
  template: .azuredevops/templates/ci.yml@raptor
  parameters:
    package_name: ${{ variables.package_name }}
    python_version: ${{ variables.pythonVersion }}
    poetry_version: ${{ variables.poetryVersion }}
    organisation_name: ${{ variables.organisation_name }}
    devops_project: ${{ variables.devops_project }}
    package_feed: ${{ variables.package_feed }}
    feed_view: $(feedView)
    pat_username: $(PatUsername)
    pat: $(DevOpsPAT)
    toMain: $(toMain)
    toDev: $(toDev)

{% endraw %}