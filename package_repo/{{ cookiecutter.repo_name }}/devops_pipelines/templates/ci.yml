{% raw %}
trigger: none

pr:
  branches:
    include:
      - "*"
    exclude: 
      - "generated/*"

variables:
  # Load shared config
  - template: config.yml

  # PR target checks
  - name: toMain
    value: $[eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/main')]

  - name: toDev
    value: $[eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/develop')]

  # Determine feed view at runtime (prod for main, dvlm otherwise)
  - name: feed_view
    value: $[replace(replace(eq(variables['toMain'], true), True, 'prod'), False, 'dvlm')]

resources:
  repositories:
    - repository: raptor
      name: municipality-of-rotterdam/raptor
      type: github
      ref: refs/tags/{% endraw %}{{cookiecutter.__cookiecutter_template_version}}{% raw %}
      endpoint: {% endraw %}{{ cookiecutter.github_service_connection }}{% raw %}

stages:

- stage: PreCommit
  displayName: Pre-commit checks
  dependsOn: [] 
  jobs:
  - job: ExecutePreCommit
    displayName: 'Perform pre-commit checks'
    steps:
    - template: .azuredevops/templates/pre_commit.yml@raptor
      parameters:
        python_version: ${{ variables.pythonVersion }}
        uv_version: ${{ variables.uvVersion }}
        uv_index_name: ${{ variables.uvIndexName }}

- stage: UnitTest
  displayName: Unit tests
  dependsOn: [] 
  jobs:
  - job: ExecuteUnitTests
    displayName: 'Unit Tests Coverage'
    steps:
    - template: .azuredevops/templates/test.yml@raptor
      parameters:
        python_version: ${{ variables.pythonVersion }}
        uv_version: ${{ variables.uvVersion }}
        uv_index_name: ${{ variables.uvIndexName }}
        package_name: {% endraw %}{{cookiecutter.package_name}}{% raw %}

- stage: Build
  displayName: Build
  dependsOn: [] 
  jobs:
  - job: Build
    displayName: 'Build and store staging artifact'
    variables:
      build: false
      prod: eq(variables['toMain'], true
    steps:
    - template: .azuredevops/templates/build.yml@raptor
      parameters:
        python_version: ${{ variables.pythonVersion }}
        uv_version: ${{ variables.uvVersion }}
        uv_index_name: ${{ variables.uvIndexName }}
        organisation_name: ${{ variables.devops_organisation }}
        devops_project: ${{ variables.devops_project }}
        package_feed: ${{ variables.package_feed }}
        feed_view: $(feed_view)
{% endraw %}
